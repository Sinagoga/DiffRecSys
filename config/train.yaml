defaults:
  - model: diffgrm
  - tokenizer: opq
  - metrics: ranking
  - datasets: amazon
  - dataloaders: stable-large
  - training_pipeline: base
  - _self_

global_setings:
  seed: 1
  exp_name: "testing"
  resume_from: null
  save_dir: "./saved/testing"
  override: True
  model_transforms: []

  monitor_metric: "val_Val@10"
  monitor_mode: "max"

  tokenizer_state_path: ${global_setings.save_dir}/tokenizer_state.pkl

training_pipeline:
  # _target_: src.pipelines.diffusion_pipeline.DiffusionPipeline

  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.003
    weight_decay: 0.0

  scheduler:
    _target_: torch.optim.lr_scheduler.OneCycleLR
    max_lr: ${training_pipeline.optimizer.lr}
    pct_start: 0.02
    div_factor: 10.0
    final_div_factor: 10.0
    steps_per_epoch: ${trainer.limit_train_batches}
    epochs: ${trainer.max_epochs}
    anneal_strategy: cos

  # ─── New: random-beam sampling hyperparameters (example) ────────────
  random_beam:
    beam_act: 64        # "random_beam_size"
    beam_max: 64
    seed: 42            # Keep this to fix random row order

  # Generation - vectorized beam search config (unified management)
  vectorized_beam_search:
    # === common config ===
    top_k_final: 10
    neg_inf_fp32: -1000000000.0
    neg_inf_fp16: -65504.0
    dedup_strategy: simple  # simple | weighted | none

    # === split-specific config ===
    # validation uses smaller beam size for speed
    val:     {beam_act: 32,  beam_max: 32}
    # test uses larger beam size for accuracy
    test:    {beam_act: 256, beam_max: 256}
    
    # optional compatibility with legacy code
    beam_act: 32
    beam_max: 32

  # ─── New: ablation decoding switch and params (off by default) ─────────
  ablate_decode:
    enabled: false           # true=enables ablation; false=skip this branch
    per_digit_topk: null     # top-L per digit in combine stage; null=same as beam_act
    beam:
      val:  { beam_act: 32 }
      test: { beam_act: 128 }

trainer:
  _target_: lightning.Trainer
  accelerator: auto
  precision: 16-mixed
  max_epochs: 200
  limit_train_batches: 600
  log_every_n_steps: 60
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  check_val_every_n_epoch: 20
  fast_dev_run: false

  deterministic: True # False for faster but less reproducible results
  benchmark: False    # True enables cudnn auto-tuner, may be non-deterministic

  logger:
    - _target_: lightning.pytorch.loggers.WandbLogger
      project: "diffusion-recommendation"
      name: ${global_setings.exp_name}
      offline: True
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: ${global_setings.monitor_metric}
      mode: ${global_setings.monitor_mode}
      save_top_k: 1
      dirpath: ${global_setings.save_dir}
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: ${global_setings.monitor_metric}
      mode: ${global_setings.monitor_mode}
      patience: 15

extra: # Currently unused
  share_embeddings: true

  # ─── New: beam modes to run in val/test stages ──────────────────────
  beam_search_modes: ["confidence", "random"]   # order controls log order
  # if only occasionally run random, remove it

  # compatibility params (legacy)
  beam_size: 10
  max_generation_len: 4

  # Data split
  train_sliding: false  # true=sliding-window augmentation; false=classic leave-one-out

  # SID Quantization
  # opq_pq(default) | rq_kmeans | none(random mapping)
  sid_quantizer: opq_pq

  # Training
  temperature: 0.07

  # Evaluation
  eval_interval: 1     # evaluate every N epochs
  eval_start_epoch: 20 # start evaluation at epoch N
  min_delta: 0.0       # improvement threshold

  # ── Auto mask schedule (off by default) ───────────────────────────
  mask_schedule:
    enabled: false

    # explicit two-stage pipeline: Stage-1 random sequential; Stage-2 guided least
    pipeline:
      - strategy: sequential
        sequential_steps: auto      # = n_digit; or set explicit, e.g. 3
        sequential_paths: 2
        epochs: 10

      - strategy: guided
        guided_select: least
        guided_steps: auto          # = n_digit (or explicit)
        guided_conf_metric: msp     # or entropy
        guided_refresh_each_step: false
        epochs: -1                  # -1 = until end/early stop

    # suggested higher evaluation frequency to detect no-improvement quickly
    eval_start_epoch_override: 5
    eval_interval_override: 1

  # ─── New: expand SID clusters to items during evaluation (optional) ──
  eval_expand_sid_to_items: false   # true=output extra _xitem metrics
  eval_expand_dedup: first          # dedup before expansion: first (keep first)
